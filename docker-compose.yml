services:

  # ─── Kafka Broker ──────────────────────────────────────────────
   kafka:
    image: confluentinc/cp-kafka:8.1.3
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:

      # ─────────────────────────────
      # KRaft Settings
      # ─────────────────────────────
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # ─────────────────────────────
      # Listeners
      # ─────────────────────────────
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092, EXTERNAL://0.0.0.0:29092, CONTROLLER://0.0.0.0:29093

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092, EXTERNAL://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT, EXTERNAL:PLAINTEXT, CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # ─────────────────────────────
      # Cluster ID
      # ─────────────────────────────
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      # ─────────────────────────────
      # Replication
      # ─────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - kafka-network 

  # ─── Kafka UI (para ver topics y mensajes) ─────────────────────
   kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: kafka-ui
      depends_on:
        - kafka
      ports:
        - "8080:8080"
      environment:
        KAFKA_CLUSTERS_0_NAME: local
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      networks:
        - kafka-network

  # ─── RabbitMQ con Management UI ────────────────────────────────
   rabbitmq:
      image: rabbitmq:3.12-management
      container_name: rabbitmq
      ports:
        - "5672:5672"    # AMQP (conexión desde tu app)
        - "15672:15672"  # Management UI
      environment:
        RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
        RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      volumes:
        - rabbitmq_data:/var/lib/rabbitmq
      networks:
        - kafka-network

dotnet-api:
    depends_on:
      - kafka
      - rabbitmq
    image: ${DOCKER_CONTAINER}:${NEW_VERSION}
    container_name: miapirabbitmq
    volumes:
      - ./wwwroot:/app/wwwroot

    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}

      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}

      ApiSettings__SecretKey: ${ApiSettings__SecretKey}

      Telegram__BotToken: ${Telegram__BotToken}

      Telegram__ChatId: ${Telegram__ChatId}

      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
  
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

    networks:
      - proxy-network
      - db-network

    restart: unless-stopped

    expose:
      - "8080"

volumes:
  rabbitmq_data:

networks:
  proxy-network:
    external: true
  db-network:
    external: true
  kafka-network:

