  #     echo 'Topics creados';
  #     "

  # ─── RabbitMQ con Management UI ────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP (conexión desde tu app)
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kafka-network

volumes:
  rabbitmq_data:

networks:
  proxy-network:
    external: true
  db-network:
    external: true
  kafka-network:

